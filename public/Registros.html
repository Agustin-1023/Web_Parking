<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Registro - Parcking</title>
	<link rel="stylesheet"  type="text/css" href="./css/Registros.css">
</head>
<body>

	 <div class="box-registro">
	 	<img class="avatar" src="assets/imagen 1.jpeg" alt="Logo de Parcking">
	 	<h1>REGISTRO DE USUARIO</h1>
	 	<form id='form-registro'>
	 		<!-- name-->
	 		<input type="text" id='nombre' name="nombre" placeholder="Nombre Completo"><br>
			<!-- username-->
	 		<input type="text" id='userName' name="userName" placeholder="Usuario"><br>
	 		<!-- E-mail-->
	 		<input type="text" id='email' name="email" placeholder="E-mail"> <br>
	 		<!-- Phone-->
	 		<input type="text" id='phone' name="phone" placeholder="Celular"><br>
	 		<!-- user pass-->
	 		<input type="password" id='password' name="password" placeholder="Password"> <br>
	 		<input type="submit"  value="Registrar"> <br>
	 	</form>
	 </div>
	 <script src="./js/registros.js"></script>
</body>
</html>
