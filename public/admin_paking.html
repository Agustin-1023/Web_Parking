	<div class="main-admin">
	 	<h1>PANEL DE ESTACIONAMIENTOS</h1>
		<div id="form-container" style="display: none; background: #fff; padding: 20px; border-radius: 8 px; margin-bottom: 20px; border: 1px solid #ddd; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
			<h3 style="color: #1a154b; margin-bottom: 15px;"> Nuevo Estacionamiento</h3>
			<div style="display: flex; gap: 15px; align-items: center; flex-wrap: wrap;">
				<input type="text" id="nombreEst" placeholder="Nombre (ej: Centro Parking)" style="[adding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1;">
				<input 	type="text" id="direccionEst" placeholder="Direccion (ej: 18 de julio 123)" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 2;">
				<button id="btn-guardar-parking" style="background: #28a745; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">GUARDAR</button>
				<button id="btn-cancelar-parking" style="background: #dc3545; color: white; padding: 10px 20px; border: none; border-radius: 4px; cursor: pointer; font-weight: bold;">CANCELAR</button>
			</div>
		</div>

	<section class="last-reservations">
			    <h2>Listado Estacionamientos</h2>
			    <table class="reservations-table">
			        <thead>
			            <tr>
			                <th>Nombre</th>
			                <th>Direccion</th>
			                <th>Pisos</th>
			                <th>Acciones</th>
			            </tr>
			        </thead>
			        <tbody>
			        </tbody>
			    </table>
			</section>
		<div class="buttons-parkins">
			<button id="button-create-bottom" type="submit">CREAR</button>
			<button id="button-edit-bottom" type="submit">MODIFICAR</button>
			<button id="button-delete-bottom" type="submit">ELIMINAR</button>
		</div>
	</div>
