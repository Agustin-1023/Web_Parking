<!DOCTYPE html>
<html>
<head>
	<meta charset="utf-8">
	<title>Registro - Parcking</title>
	<link rel="stylesheet"  type="text/css" href="./css/Registros.css">
	<script src="./js/registros.js" defer></script>
</head>
<body>

	 <div class="box-registro">
	 	<img class="avatar" src="assets/imagen 1.jpeg" alt="Logo de Parcking">
	 	<h1>REGISTRO DE USUARIO</h1>
	 	<form id='FormularioRegistro'>
	 		<!-- name-->
	 		<input type="text" id='name'  name="Name" placeholder="Nombre Completo"><br>
	 		<!-- username-->
	 		<input type="text" id='user-name' name="userName" placeholder="Usuario"><br>
	 		<!-- E-mail-->
	 		<input type="text" id='E-mail' name="EMail" placeholder="E-mail"> <br>
	 		<!-- Phone-->
	 		<input type="text" id='Celular' name="phone" placeholder="Celular"><br>
	 		<!-- user pass-->
	 		<input type="password" id='Password' name="user-Password" placeholder="Password"> <br>
	 		<input type="submit"  value="Registrar"> <br>
	 	</form>
	 </div>

</body>
</html>
