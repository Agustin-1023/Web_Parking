<!DOCTYPE html>
<html lang="es">
<head>
	<meta charset="utf-8">
	<title>ADMIN PISOS</title>
	<link rel="stylesheet" type="text/css" href="./css/admin_parking.css">
	<link rel="stylesheet" type="text/css" href="./css/admin_piso.css">
</head>
<body>
	<aside class="sidebar">
		<div class="sidebar-header">
			<h3>Administracion</h3>
		</div>
		<ul class="sidebar-menu">
			<li><a href="#">Estadisticas</a></li>
			<li><a href="#">Reservas</a></li>
			<li><a href="#">Lugares</a></li>
			<li><a href="#">Pisos</a></li>
			<li><a href="#">Usuarios</a></li>
			<li><a href="#">Estacionamiento</a></li>
			<li><a href="#">Reportes</a></li>
			<li><a href="#">Configuraciones</a></li>
			<li><a href="#">Administradores</a></li>
			<li><a href="#">Cerrar sesion</a></li>
		</ul>
	</aside>

	<div class="main-admin">
		<h1>PANEL DE GESTION DE PISOS</h1>

		<div id="form-container" style="display:none;">
			<h3 style="color: #1a154b; margin-bottom: 15px;"> Nuevo Piso</h3>
			<div style="display: flex-wrap: wrap;">
				<input type="number" id="numeroPiso" placeholder="Numero de piso" style="padding: 10px; border: 1px solid #ccc; border-radius: 4px; flex: 1;">
				<input type="text" id="descripcionPiso" placeholder="Descripcion (ej: Piso 1)" style="padding: 10px;
					     border: 1px solid #ccc; border-radius: 4px; flex: 2;">
				<button id="btn-guardar-piso" class="btn-action">GUARDAR</button>

				<button id="btn-cancelar-piso" class="btn-action">CANCELAR</button>
			</div>
		</div>

		<section class="last-reservations">
			<h2>Listado de Pisos</h2>
			<table class="reservations-table">
				<thead>
					<tr>
						<th>Numero</th>
						<th>Descripcion</th>
						<th>Acciones</th>
					</tr>
				</thead>
				<tbody id="tbody-pisos">
				</tbody>
			</table>
		</section>

		<div class="buttons-parkins">
			<button id="button-create-bottom">CREAR PISO</button>
			<button id="button-edit-bottom">MODIFICAR</button>
			<button id="button-delete-bottom">ELIMINAR</button>
		</div>
	</div>

	<script src="./js/admin_piso.js"></script>
</body>
</html>
